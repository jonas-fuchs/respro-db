name: HerpesDRG Autobump

"on":
  workflow_dispatch:
  schedule:
    - cron: "0 5 1 * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-herpesdrg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve upstream source metadata
        id: source
        run: |
          set -euo pipefail
          url="https://raw.githubusercontent.com/ojcharles/herpesdrg-db/main/herpesdrg-db.tsv"
          etag="$(curl -fsSI "$url" | awk -F': ' 'tolower($1)=="etag" {print $2}' | tr -d '\r' | head -n1)"
          modified="$(curl -fsSI "$url" | awk -F': ' 'tolower($1)=="last-modified" {print $2}' | tr -d '\r' | head -n1)"

          {
            echo "source_url=$url"
            echo "source_etag=$etag"
            echo "source_last_modified=$modified"
          } >> "$GITHUB_OUTPUT"

          echo "Source URL: $url"
          echo "Source ETag: ${etag:-unknown}"
          echo "Source Last-Modified: ${modified:-unknown}"

      - name: Install converter dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r databases/herpesdrg/scripts/requirements.txt

      - name: Run converter
        run: |
          python databases/herpesdrg/scripts/convert.py \
            --source-url "${{ steps.source.outputs.source_url }}" \
            --output-dir databases/herpesdrg/output

      - name: Validate artifacts
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          out = Path("databases/herpesdrg/output")
          rules = out / "rules.tsv"
          metadata = out / "metadata.json"
          formula = out / "formula-rules.tsv"

          if not rules.exists():
              raise SystemExit("rules.tsv missing")
          if not metadata.exists():
              raise SystemExit("metadata.json missing")

          required_rules = [
              "gene",
              "reference_identifier",
              "position",
              "reference",
              "mutation",
              "antiviral",
          ]
          with rules.open("r", encoding="utf-8") as fh:
              lines = [line.rstrip("\n") for line in fh]
          if not lines:
              raise SystemExit("rules.tsv is empty")

          header = lines[0].split("\t")
          missing_rules = [c for c in required_rules if c not in header]
          if missing_rules:
              raise SystemExit(f"rules.tsv missing required headers: {missing_rules}")

          idx = {name: i for i, name in enumerate(header)}
          for line_no, line in enumerate(lines[1:], start=2):
              if not line.strip():
                  continue
              cells = line.split("\t")
              for col in required_rules:
                  pos = idx[col]
                  if pos >= len(cells) or not cells[pos].strip():
                      raise SystemExit(f"rules.tsv empty required cell at line {line_no}, column {col}")

          allowed_metadata = {
              "maintainers",
              "contact",
              "publication_pmid",
              "website",
              "description",
              "maintainer_update",
              "license",
              "tsv_checksum",
          }
          payload = json.loads(metadata.read_text(encoding="utf-8"))
          keys = set(payload.keys())
          if keys != allowed_metadata:
              raise SystemExit(
                  "metadata.json keys mismatch. "
                  f"expected={sorted(allowed_metadata)} got={sorted(keys)}"
              )

          if not str(payload["maintainer_update"]).strip():
              raise SystemExit("metadata.json maintainer_update is empty")
          if not str(payload["tsv_checksum"]).startswith("sha256:"):
              raise SystemExit("metadata.json tsv_checksum does not start with sha256:")

          if formula.exists():
              with formula.open("r", encoding="utf-8") as fh:
                  flines = [line.rstrip("\n") for line in fh]
              if flines:
                  fheader = flines[0].split("\t")
                  required_formula = ["group_id", "antiviral", "expression"]
                  missing_formula = [c for c in required_formula if c not in fheader]
                  if missing_formula:
                      raise SystemExit(
                          "formula-rules.tsv missing required headers: "
                          f"{missing_formula}"
                      )
          PY

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: autobump/herpesdrg
          delete-branch: true
          commit-message: "chore(herpesdrg): autobump source outputs"
          title: "chore: autobump herpesdrg outputs"
          body: |
            Automated update for HerpesDRG source data.

            - Source URL: ${{ steps.source.outputs.source_url }}
            - Source ETag: ${{ steps.source.outputs.source_etag }}
            - Source Last-Modified: ${{ steps.source.outputs.source_last_modified }}

            This PR was generated by the autobump workflow.
          labels: autobump
          add-paths: |
            databases/herpesdrg/output/rules.tsv
            databases/herpesdrg/output/formula-rules.tsv
            databases/herpesdrg/output/metadata.json
            databases/herpesdrg/output/non-migrated-rules.txt
