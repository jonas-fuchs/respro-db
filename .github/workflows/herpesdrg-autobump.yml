name: HerpesDRG Autobump

"on":
  workflow_dispatch:
  schedule:
    - cron: "0 5 1 * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-herpesdrg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve latest upstream source
        id: source
        run: |
          set -euo pipefail
          repo_owner="ojcharles"
          repo_name="herpesdrg-db"
          file_path="herpesdrg-db.tsv"
          branch="main"

          # Get latest commit timestamp for the file via GitHub API
          api_url="https://api.github.com/repos/${repo_owner}/${repo_name}/commits?path=${file_path}&sha=${branch}&per_page=1"
          response=$(curl -fsSL "$api_url")
          commit_date=$(echo "$response" | jq -r '.[0].commit.committer.date' | cut -d'T' -f1)
          commit_sha=$(echo "$response" | jq -r '.[0].sha')

          raw_url="https://raw.githubusercontent.com/${repo_owner}/${repo_name}/${branch}/${file_path}"

          {
            echo "source_url=$raw_url"
            echo "source_commit_date=$commit_date"
            echo "source_commit_sha=$commit_sha"
          } >> "$GITHUB_OUTPUT"

          echo "Source URL: $raw_url"
          echo "Source Commit Date: $commit_date"
          echo "Source Commit SHA: $commit_sha"

      - name: Compare with current tracked source
        id: update_check
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          latest = "${{ steps.source.outputs.source_commit_date }}"
          metadata_path = "databases/herpesdrg/output/metadata.json"

          current = ""
          if os.path.exists(metadata_path):
              with open(metadata_path, "r", encoding="utf-8") as fh:
                  metadata = json.load(fh)
              current = str(metadata.get("maintainer_update", "")).strip()
          else:
              print(f"Note: metadata.json does not exist (first run?)", file=sys.stderr)

          print(f"Current source date: '{current}'", file=sys.stderr)
          print(f"Latest source date:  '{latest}'", file=sys.stderr)

          should_update = "true" if latest and latest != current else "false"

          print(f"Update required: {should_update}", file=sys.stderr)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"current_source_date={current}\n")
              fh.write(f"should_update={should_update}\n")
          PY

      - name: Install converter dependencies
        if: steps.update_check.outputs.should_update == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r databases/herpesdrg/scripts/requirements.txt

      - name: Run converter
        if: steps.update_check.outputs.should_update == 'true'
        run: |
          python databases/herpesdrg/scripts/convert.py \
            --source-url "${{ steps.source.outputs.source_url }}" \
            --output-dir databases/herpesdrg/output

      - name: Build global metadata manifest
        if: steps.update_check.outputs.should_update == 'true'
        run: |
          python scripts/build_metadata_manifest.py

      - name: No update detected
        if: steps.update_check.outputs.should_update != 'true'
        run: |
          echo "No new upstream source detected; skipping converter and PR creation."

      - name: Create pull request
        if: steps.update_check.outputs.should_update == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: autobump/herpesdrg
          delete-branch: true
          commit-message: "chore(herpesdrg): autobump source outputs"
          title: "chore: autobump herpesdrg outputs"
          body: |
            Automated monthly update for HerpesDRG source data.

            - Previous source date: ${{ steps.update_check.outputs.current_source_date }}
            - Source commit date: ${{ steps.source.outputs.source_commit_date }}
            - Source commit SHA: ${{ steps.source.outputs.source_commit_sha }}
            - Source URL: ${{ steps.source.outputs.source_url }}

            This PR was generated by the autobump workflow.
          labels: autobump
          add-paths: |
            databases/herpesdrg/output/rules.tsv
            databases/herpesdrg/output/formula-rules.tsv
            databases/herpesdrg/output/metadata.json
            databases/herpesdrg/output/non-migrated-rules.txt
            databases/manifest.json
