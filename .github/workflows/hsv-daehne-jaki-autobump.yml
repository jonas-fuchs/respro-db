name: HSV Daehne Jaki Autobump

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 1 * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-hsv-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve latest Zenodo XLSX for concept
        id: zenodo
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          concept_recid = "14351986"
          url = f"https://zenodo.org/api/records?q=conceptrecid:{concept_recid}&sort=mostrecent"
          with urllib.request.urlopen(url) as response:
              payload = json.load(response)

          hits = payload.get("hits", {}).get("hits", [])
          if not hits:
              raise SystemExit("No records returned by Zenodo API for conceptrecid 14351986")

          record = hits[0]
          record_id = str(record.get("id", ""))
          updated = str(record.get("updated", ""))

          latest_url = None
          for file_obj in record.get("files", []):
              key = str(file_obj.get("key", ""))
              if key.endswith(".xlsx"):
                  links = file_obj.get("links", {})
                  latest_url = links.get("self") or links.get("download")
                  if latest_url:
                      break

          if not latest_url:
              raise SystemExit("Could not locate XLSX file link in latest Zenodo record")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"source_url={latest_url}\n")
              fh.write(f"record_id={record_id}\n")
              fh.write(f"updated={updated}\n")

          print(f"Using Zenodo record {record_id}, updated={updated}")
          print(f"Source URL: {latest_url}")
          PY

      - name: Compare with current tracked Zenodo record
        id: update_check
        run: |
          python - <<'PY'
          import json
          import os
          import re

          latest = "${{ steps.zenodo.outputs.record_id }}"
          metadata_path = "databases/hsv_daehne_jaki/output/metadata.json"

          current = ""
          if os.path.exists(metadata_path):
              with open(metadata_path, "r", encoding="utf-8") as fh:
                  metadata = json.load(fh)
              website = str(metadata.get("website", ""))
              match = re.search(r"/records/(\d+)", website)
              if match:
                  current = match.group(1)

          should_update = "true" if latest and latest != current else "false"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"current_record_id={current}\n")
              fh.write(f"should_update={should_update}\n")

          print(f"Current record: {current or 'none'}")
          print(f"Latest record: {latest or 'none'}")
          print(f"Update required: {should_update}")
          PY

      - name: Install converter dependencies
        if: steps.update_check.outputs.should_update == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r databases/hsv_daehne_jaki/scripts/requirements.txt

      - name: Run converter
        if: steps.update_check.outputs.should_update == 'true'
        run: |
          python databases/hsv_daehne_jaki/scripts/convert.py \
            --source-url "${{ steps.zenodo.outputs.source_url }}" \
            --output-dir databases/hsv_daehne_jaki/output

      - name: No update detected
        if: steps.update_check.outputs.should_update != 'true'
        run: |
          echo "No new Zenodo version detected; skipping converter and PR creation."

      - name: Create pull request
        if: steps.update_check.outputs.should_update == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: autobump/hsv-daehne-jaki
          delete-branch: true
          commit-message: "chore(hsv-daehne-jaki): autobump Zenodo outputs"
          title: "chore: autobump hsv daehne jaki outputs"
          body: |
            Automated monthly update for HSV Daehne/Jaki source data.

            - Previous Zenodo record: ${{ steps.update_check.outputs.current_record_id }}
            - Zenodo record: ${{ steps.zenodo.outputs.record_id }}
            - Zenodo updated timestamp: ${{ steps.zenodo.outputs.updated }}
            - Source file: ${{ steps.zenodo.outputs.source_url }}

            This PR was generated by the autobump workflow.
          labels: autobump
          add-paths: |
            databases/hsv_daehne_jaki/output/rules.tsv
            databases/hsv_daehne_jaki/output/formula-rules.tsv
            databases/hsv_daehne_jaki/output/metadata.json
            databases/hsv_daehne_jaki/output/non-migrated-rules.txt
